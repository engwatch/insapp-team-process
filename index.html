async function decrypt() {
  const pw = document.getElementById("pw").value;
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.digest("SHA-256", enc.encode(pw));
  const key = await crypto.subtle.importKey("raw", keyMaterial, "AES-GCM", false, ["decrypt"]);
  const nonce = Uint8Array.from(atob(DATA.nonce), c => c.charCodeAt(0));
  const ct = Uint8Array.from(atob(DATA.ciphertext), c => c.charCodeAt(0));
  try {
    const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv: nonce }, key, ct);
    const html = new TextDecoder().decode(pt);
    document.open(); document.write(html); document.close();
  } catch (e) {
    document.getElementById("err").style.display = "block";
  }
}
document.getElementById("pw").addEventListener("keypress", e => { if (e.key === "Enter") decrypt(); });
