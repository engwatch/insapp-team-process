<style>

body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f0f4f8;font-family:'Inter',system-ui,sans-serif}
.lock-card{background:#fff;border-radius:16px;padding:48px;box-shadow:0 4px 24px rgba(0,0,0,.08);text-align:center;max-width:400px;width:90%%}

p{font-size:14px;color:#64748b;margin-bottom:24px}

button{width:100%%;padding:12px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;margin-top:12px;transition:background .2s}
button:hover{background:#1d4ed8}
.error{color:#ef4444;font-size:13px;margin-top:8px;display:none}

function b64d(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0))}
async function unlock(){
  const p=document.getElementById("pwd").value;
  const e=document.getElementById("err");
  e.style.display="none";
  try{
    const enc=new TextEncoder();
    const km=await crypto.subtle.importKey("raw",enc.encode(p),"PBKDF2",false,["deriveKey"]);
    const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64d(SALT),iterations:100000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
    const dec=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64d(IV)},key,b64d(CT));
    const html=new TextDecoder().decode(dec);
    document.open();document.write(html);document.close();
  }catch(x){e.style.display="block"}
}
document.getElementById("pwd").addEventListener("keydown",e=>{if(e.key==="Enter")unlock()});
</script>
