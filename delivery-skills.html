<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Delivery System</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;background:#f5f6fa;min-height:100vh;display:flex;align-items:center;justify-content:center;color:#2d3436}
  .card{background:#fff;padding:36px 40px;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.08);border:1px solid #e0e0e0;max-width:360px;width:90%}
  h1{font-size:20px;font-weight:700;color:#2d3436;margin-bottom:6px;letter-spacing:-0.01em}
  .sub{color:#636e72;font-size:14px;margin-bottom:20px}
  .row{display:flex;gap:8px}
  input{flex:1;padding:11px 14px;border:1px solid #dfe6e9;border-radius:10px;font-size:15px;background:#f8f9fa;color:#2d3436;outline:none;transition:border .15s,box-shadow .15s}
  input:focus{border-color:#0984e3;box-shadow:0 0 0 3px rgba(9,132,227,.12)}
  button{padding:11px 18px;background:#0984e3;color:#fff;border:0;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:0.01em;transition:background .15s,transform .1s,box-shadow .15s}
  button:hover{background:#0770c2;box-shadow:0 4px 10px rgba(9,132,227,.22)}
  button:active{background:#065ea3;transform:translateY(1px);box-shadow:inset 0 2px 4px rgba(0,0,0,.12)}
  .err{color:#d63031;font-size:13px;margin-top:10px;min-height:18px}
</style>
</head>
<body>
<div class="card">
  <h1>Delivery System</h1>
  <div class="sub">Введите пароль для доступа</div>
  <div class="row">
    <input type="password" id="p" placeholder="Пароль" autofocus>
    <button id="b">Открыть</button>
  </div>
  <div class="err" id="e"></div>
</div>
